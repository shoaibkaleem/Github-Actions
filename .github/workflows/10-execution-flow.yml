name: 10 - Controlling The Execution Flow

on:
  workflow_dispatch:
    inputs:
        pass-unit-tests:
          type: boolean
          description: Whether to pass unit tests or not
          default: true


jobs:
 lint-build:
    runs-on: ubuntu-latest
    steps:
       - name: lint and build
         run: echo "Linting and building project"
 unit-test:
    runs-on: ubuntu-latest
    steps:
       - name: Running Unit tests
         run: echo "Running test...."
       - name: Failling tests
         if: ${{!inputs.pass-unit-tests}}
         run: exit 1
 deploy-nonprod:
    runs-on: ubuntu-latest
    needs:
        - lint-build
        - unit-test
    steps:
        - name: Deploying to non-prod environment
          run: echo "Deploying to non-prod environment"
        - name: Failing deployment
          run: exit 1
    
 e2e-test:
    runs-on: ubuntu-latest
    needs: 
        - deploy-nonprod
    steps:
        - name: Running E2E tests
          run: echo "Running E2E tests"
 load-tests:
    runs-on: ubuntu-latest
    needs:
        - deploy-nonprod
    steps:
        - name: Running load tests
          run: echo "Running load tests"
    
 deploy-prod:
    runs-on: ubuntu-latest
    needs:
        - e2e-test
        - load-tests
    steps:
       - name: Deployeing to prod
         run: echo "Deploying to prod..."


