name: 03 - workflow Runners

on: push

jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - run: | 
          echo "this job is running on an ubuntu runner."
          echo "Runner OS: $RUNNER_OS"


  windows-echo:
    runs-on: windows-latest
    steps:
      - name: Show OS
        shell: bash
        run: | 
          echo "this job is running on an ubuntu runner."
          echo "Runner OS: $RUNNER_OS"
